<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Management MVP</title>
    <style>
      :root {
        --accent-yellow: #ecad0a;
        --primary-blue: #209dd7;
        --secondary-purple: #753991;
        --navy-dark: #032147;
        --gray-text: #888888;
      }

      body {
        align-items: center;
        background: #f7f8fb;
        color: var(--navy-dark);
        display: flex;
        font-family: "Segoe UI", Arial, sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      main {
        background: #ffffff;
        border: 1px solid rgba(3, 33, 71, 0.08);
        border-radius: 8px;
        box-shadow: 0 18px 40px rgba(3, 33, 71, 0.12);
        max-width: 640px;
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
      }

      p {
        color: var(--gray-text);
        line-height: 1.6;
        margin: 0;
      }

      a {
        color: var(--primary-blue);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Project Management MVP</h1>
      <p>The local FastAPI backend is serving static HTML. The Kanban frontend will replace this page in Part 3.</p>
    </main>
  </body>
</html>
